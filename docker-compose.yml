services:
  skyfall-ai:
    build: .
    container_name: skyfall_ai_v7
    ports:
      - "8888:8888"
    volumes:
      - .:/app
    environment:
      - SKYFALL_AUTH_ENABLED=false
      - DEBUG_MODE=0
    # nmap binary has file capabilities (cap_net_raw=eip); Docker blocks
    # these unless the container is granted matching caps AND the default
    # no-new-privileges restriction is lifted.
    cap_add:
      - NET_RAW
      - NET_ADMIN
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:false
    restart: unless-stopped
    networks:
      - skyfall-net

networks:
  skyfall-net:
    driver: bridge
